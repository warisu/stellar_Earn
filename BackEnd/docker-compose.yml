version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: stellar-earn-postgres
    environment:
      POSTGRES_DB: stellar_earn
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d stellar_earn"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:
    driver: local