version: "3.8"

services:
  subgraph:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stellar-earn-subgraph
    ports:
      - "4000:4000"
    volumes:
      - subgraph-data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  subgraph-data:
    driver: local
