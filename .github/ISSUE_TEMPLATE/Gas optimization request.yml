name: "⛽ Gas / Fee Optimization Request"
description: >
  Report a Soroban contract function or backend workflow that consumes
  more compute units, ledger entries, or XLM fees than expected, or
  suggest a targeted optimization.
title: "[GAS] <short description of the high-cost operation>"
labels:
  - "gas-optimization"
  - "smart-contract"
  - "performance"
assignees: []

body:
  # ── Context ────────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## ⛽ Gas / Fee Optimization Request
        Thank you for helping keep StellarEarn lean and cost-efficient!
        Please fill in as much detail as possible — concrete numbers and
        reproduction steps are essential for the team to reproduce and fix
        the issue.

        > **Note:** "Gas" on Stellar/Soroban refers to **compute units (CPU & memory)**,
        > **ledger entry reads/writes**, and the resulting **resource fee in XLM**.
        > All three dimensions matter.

  # ── Affected area ──────────────────────────────────────────────────────────
  - type: dropdown
    id: affected_area
    attributes:
      label: Affected Area
      description: Which part of the codebase is the bottleneck?
      options:
        - "Soroban contract — register_task"
        - "Soroban contract — submit_proof"
        - "Soroban contract — approve"
        - "Soroban contract — claim_reward"
        - "Soroban contract — get_user_stats"
        - "Soroban contract — get_task"
        - "Soroban contract — other function"
        - "Backend — Stellar/Soroban RPC call"
        - "Backend — transaction building / signing"
        - "Backend — payout logic"
        - "Backend — webhook processing"
        - "Other (describe below)"
      multiple: false
    validations:
      required: true

  - type: input
    id: function_name
    attributes:
      label: Specific Function / Endpoint
      description: >
        Exact function name (contract) or API route (backend).
        e.g. `register_task`, `POST /quests/:id/approve`
      placeholder: "e.g. approve()"
    validations:
      required: true

  # ── Cost measurements ───────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: "### 📊 Observed vs Expected Cost"

  - type: textarea
    id: observed_cost
    attributes:
      label: Observed Cost (actual measurements)
      description: >
        Paste the resource footprint you observed. Include as many of the
        following as you can obtain from `soroban contract invoke --resource-stats`,
        Horizon response, or Stellar Expert.
      placeholder: |
        - Network: testnet / mainnet
        - Compute units (CPU): 
        - Memory bytes: 
        - Ledger entry reads: 
        - Ledger entry writes: 
        - Resource fee (XLM): 
        - Inclusion fee (XLM): 
        - Total fee (XLM): 
        - Transaction hash (if available): 
    validations:
      required: true

  - type: textarea
    id: expected_cost
    attributes:
      label: Expected / Acceptable Cost
      description: >
        What do you consider a reasonable cost for this operation?
        Reference comparable contracts or previous benchmarks if possible.
      placeholder: |
        - Expected compute units: 
        - Expected fee range (XLM): 
        - Basis for expectation (link / benchmark): 
    validations:
      required: true

  # ── Reproduction ────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: "### 🔁 Reproduction"

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to Reproduce
      description: >
        Provide the minimal steps to reproduce the high-cost scenario,
        including contract invocation commands or API calls.
      placeholder: |
        1. Deploy contract to testnet with `make contract-deploy-testnet`
        2. Invoke: `soroban contract invoke --id $CONTRACT_ID --fn approve --arg ...`
        3. Check resource stats with `--resource-stats` flag
        4. Observe fee of X XLM
    validations:
      required: true

  - type: textarea
    id: invocation_command
    attributes:
      label: Invocation Command / Payload
      description: >
        Paste the exact CLI command, curl, or SDK call used.
        Redact any secret keys.
      render: shell
      placeholder: |
        soroban contract invoke \
          --id $CONTRACT_ID \
          --network testnet \
          --fn approve \
          --arg id=Q-001 \
          --arg address=GABC... \
          --arg amount=100 \
          --resource-stats

  # ── Root cause hypothesis ───────────────────────────────────────────────────
  - type: dropdown
    id: optimization_type
    attributes:
      label: Suspected Optimization Category
      description: >
        What do you think is driving the excess cost? Select all that apply.
      options:
        - "Unnecessary ledger reads (redundant storage lookups)"
        - "Unnecessary ledger writes (storing data that could be derived)"
        - "Large persistent data structures (Vec/Map growth)"
        - "Excessive compute (loops, recursion, heavy arithmetic)"
        - "Frequent contract-to-contract calls (cross-contract overhead)"
        - "Suboptimal data encoding / serialization"
        - "Missing batching (multiple separate transactions instead of one)"
        - "TTL / entry expiry mismanagement"
        - "Unclear — needs profiling"
      multiple: true
    validations:
      required: true

  - type: textarea
    id: root_cause
    attributes:
      label: Root Cause Analysis (optional)
      description: >
        If you have already dug into the code, describe what you found.
        Include file paths and line numbers where relevant.
      placeholder: |
        In `contracts/earn-quest/src/lib.rs`, the `approve()` function
        calls `env.storage().persistent().get(&key)` twice on lines 142
        and 178 for the same key. Caching the result in a local variable
        would eliminate one ledger read per invocation.

  # ── Proposed solution ───────────────────────────────────────────────────────
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution / Approach
      description: >
        Describe how you would fix it. Pseudocode or a diff snippet is
        very welcome, but not required.
      placeholder: |
        1. Cache the `TaskRecord` from storage in a local variable at the
           top of `approve()` instead of re-fetching inside the loop.
        2. Replace `Vec<Address>` with a `Map<u32, Address>` for O(1) lookups.
        3. Batch multiple approvals in a single transaction using a `Vec<ApproveArg>`.

  # ── Impact ──────────────────────────────────────────────────────────────────
  - type: dropdown
    id: severity
    attributes:
      label: Severity / Impact
      description: How much does this affect users or the platform?
      options:
        - "Critical — fees make the feature economically unviable"
        - "High — noticeably expensive; deters frequent use"
        - "Medium — elevated cost but still functional"
        - "Low — minor inefficiency; optimization opportunity"
    validations:
      required: true

  - type: textarea
    id: impact_description
    attributes:
      label: Business / User Impact
      description: >
        Who is affected and how? e.g. quest creators paying excessive
        fees on every approval, or contributors unable to claim rewards
        on mainnet due to prohibitive fees.
      placeholder: |
        Quest approvers on mainnet currently pay ~0.05 XLM per approval.
        For DAOs running 100+ quests per week this becomes $X/week in
        unnecessary fees, directly reducing the platform's reward budget.
    validations:
      required: true

  # ── Environment ─────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: "### 🖥️ Environment"

  - type: dropdown
    id: network
    attributes:
      label: Stellar Network
      options:
        - "Local sandbox"
        - "Testnet"
        - "Mainnet"
        - "Multiple"
    validations:
      required: true

  - type: input
    id: soroban_cli_version
    attributes:
      label: Soroban CLI Version
      placeholder: "e.g. soroban 21.0.1"

  - type: input
    id: rust_version
    attributes:
      label: Rust / Cargo Version
      placeholder: "e.g. rustc 1.78.0"

  - type: input
    id: contract_commit
    attributes:
      label: Contract Commit / Version
      placeholder: "e.g. main @ abc1234"

  # ── Additional context ──────────────────────────────────────────────────────
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: >
        Attach Horizon response JSON, `--resource-stats` output, Stellar
        Expert transaction links, flamegraphs, or any other supporting
        evidence here.

  # ── Checklist ───────────────────────────────────────────────────────────────
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: >
            I have searched existing issues and this optimization has not
            already been reported.
          required: true
        - label: >
            I have included concrete cost measurements (not just "it feels slow").
          required: true
        - label: >
            I have tested on testnet or local sandbox and can reproduce the issue.
          required: true
        - label: >
            I am not including any secret keys, mnemonics, or sensitive credentials.
          required: true