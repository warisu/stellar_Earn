name: Contract Bug Report
description: Report a bug in the EarnQuest Soroban smart contract. Use this template to provide a detailed reproduction so maintainers can triage and fix the issue quickly.
title: "[Contract Bug]: "
labels:
  - bug
  - smart-contract
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        ## Contract Bug Report
        Thank you for taking the time to report this issue. Please fill out all required fields as completely as possible. Incomplete reports may be closed without action.

        > **Security vulnerabilities** should **not** be reported here. Please follow the project's security disclosure process or contact the maintainers privately.

  - type: dropdown
    id: contract
    attributes:
      label: Affected contract
      description: Which contract does this bug affect?
      options:
        - earn-quest (main contract)
        - Cross-contract interaction
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is the impact of this bug?
      options:
        - "Critical - funds at risk or contract permanently broken"
        - "High - core functionality broken, no workaround"
        - "Medium - functionality degraded, workaround exists"
        - "Low - minor or cosmetic issue"
    validations:
      required: true

  - type: input
    id: network
    attributes:
      label: Network / environment
      description: Which network did you observe this bug on?
      placeholder: "e.g. Testnet, Futurenet, Mainnet, Local (Stellar CLI sandbox)"
    validations:
      required: true

  - type: input
    id: contract-version
    attributes:
      label: Contract version or commit
      description: The deployed contract ID, Git commit hash, or release tag where the bug was observed.
      placeholder: "e.g. CAXXX...YYY (contract ID) or git commit abc1234 or v1.2.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is. What did you observe?
      placeholder: |
        Describe what happened, including any error messages, unexpected state, or wrong return values.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
      placeholder: |
        Describe the correct behaviour you expected the contract to exhibit.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, step-by-step reproduction. Include exact function calls, arguments, and invocation order.
      placeholder: |
        1. Deploy the contract to Testnet with the following parameters: ...
        2. Invoke `create_quest` with arguments: { quest_id: 1, reward: 100, ... }
        3. Invoke `submit_quest` with arguments: { quest_id: 1, participant: GXXX... }
        4. Observe that the contract returns an error instead of the expected result.
    validations:
      required: true

  - type: textarea
    id: reproduction-test
    attributes:
      label: Minimal reproduction test (Rust)
      description: If possible, paste a minimal Rust test that reproduces the bug. Optional but speeds up triage.
      render: rust

  - type: textarea
    id: transaction
    attributes:
      label: Transaction hash / diagnostic events
      description: Paste the failing transaction hash or Stellar diagnostic events.
      placeholder: |
        Transaction hash: abc123...

  - type: textarea
    id: contract-state
    attributes:
      label: Relevant contract state
      description: Describe relevant on-chain state before and after the failing call.
      placeholder: |
        Before: quest_id 1 -> Open, escrow balance: 100 XLM
        After:  quest_id 1 -> Open (expected: Completed)

  - type: dropdown
    id: function
    attributes:
      label: Affected function(s)
      description: Which contract function(s) are involved?
      multiple: true
      options:
        - initialize
        - create_quest
        - submit_quest
        - approve_submission
        - reject_submission
        - dispute_submission
        - resolve_dispute
        - release_escrow
        - cancel_quest
        - update_admin
        - Other / unknown

  - type: textarea
    id: analysis
    attributes:
      label: Root cause hypothesis (optional)
      description: If you investigated the source, share your hypothesis. Include file paths and line numbers if possible.

  - type: checkboxes
    id: checklist
    attributes:
      label: Reporter checklist
      options:
        - label: I have searched existing issues and this bug has not been reported before.
          required: true
        - label: I have verified this is reproducible on the network/environment I specified.
          required: true
        - label: This is not a security vulnerability.
          required: true
        - label: I have provided enough detail to reproduce without contacting me first.
          required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Links to related issues, PRs, or external references.