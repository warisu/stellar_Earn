name: Periodic Architecture Review
description: Schedule and track a recurring review of system architecture, module boundaries, and operational risks.
title: "[Architecture Review]: "
labels:
  - collaboration
  - developer-experience
  - needs-review
body:
  - type: markdown
    attributes:
      value: |
        Use this template for periodic architecture reviews across the backend, frontend, contracts, infrastructure, and documentation. Keep the issue focused on review findings and follow-up decisions rather than implementation work.

  - type: input
    id: review-period
    attributes:
      label: Review period
      description: Identify the cadence or date range this review covers.
      placeholder: "Q2 2026, May 2026, or 2026-05-01 to 2026-05-31"
    validations:
      required: true

  - type: dropdown
    id: primary-area
    attributes:
      label: Primary area
      description: Select the main area under review.
      options:
        - Backend
        - Frontend
        - Smart contracts
        - Subgraph
        - Infrastructure / CI
        - Cross-cutting architecture
        - Documentation / process
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Review scope
      description: Mark the areas that should be included in this review.
      options:
        - label: Module boundaries and dependency direction
        - label: API contracts, DTO validation, and error handling
        - label: Database schema, migrations, and query/index strategy
        - label: Background jobs, queues, and event-driven flows
        - label: Stellar / Soroban contract interactions
        - label: Security, secrets handling, and authorization boundaries
        - label: Observability, logging, monitoring, and operational alerts
        - label: Test coverage and release confidence
        - label: Documentation freshness and onboarding impact

  - type: textarea
    id: context
    attributes:
      label: Context and recent changes
      description: Summarize major changes, incidents, migrations, or decisions since the last architecture review.
      placeholder: |
        - New modules, services, or contracts introduced
        - Significant refactors or migrations
        - Production incidents, scaling concerns, or repeated defects
        - Prior review action items still open
    validations:
      required: true

  - type: textarea
    id: review-questions
    attributes:
      label: Review questions
      description: List the questions reviewers should answer during this architecture review.
      placeholder: |
        - Are module boundaries still clear and enforceable?
        - Are any direct dependencies creating tight coupling or circular dependency risk?
        - Do current tests cover the highest-risk flows?
        - Are security-sensitive paths documented and observable?
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: Findings
      description: Capture review findings, risks, tradeoffs, and proposed decisions.
      placeholder: |
        Finding:
        Impact:
        Recommendation:
        Owner:
        Follow-up issue:

  - type: checkboxes
    id: completion-checklist
    attributes:
      label: Completion checklist
      description: Complete these before closing the review issue.
      options:
        - label: Architecture notes or diagrams were reviewed and updated where needed
          required: true
        - label: Security and authorization boundaries were reviewed
          required: true
        - label: Performance, scalability, and operational risks were reviewed
          required: true
        - label: Test coverage gaps were identified and follow-up issues were created where needed
          required: true
        - label: Decisions, tradeoffs, and owners were documented in this issue or linked documentation
          required: true
        - label: Follow-up issues were created for implementation work instead of expanding this review issue
          required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Link related PRs, previous architecture reviews, incidents, diagrams, docs, or dashboards.
      placeholder: |
        - Previous review:
        - Architecture diagram:
        - Relevant PRs:
        - Related incidents:
