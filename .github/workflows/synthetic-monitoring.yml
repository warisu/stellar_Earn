name: Synthetic Monitoring

on:
  # Run on every push/PR to catch regressions early
  push:
    branches: [main, master]
    paths:
      - 'scripts/synthetic-monitor.ts'
      - 'scripts/synthetic-monitor.test.ts'
      - '.github/workflows/synthetic-monitoring.yml'
      - 'FrontEnd/my-app/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'scripts/synthetic-monitor.ts'
      - 'scripts/synthetic-monitor.test.ts'
      - '.github/workflows/synthetic-monitoring.yml'
      - 'FrontEnd/my-app/**'
  # Scheduled availability check against a deployed environment
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  # Allow manual trigger with a custom target URL
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target base URL to monitor'
        required: false
        default: 'https://stellar-earn.vercel.app'

jobs:
  unit-tests:
    name: Monitor unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tsx
        run: npm install -g tsx

      - name: Run synthetic monitor unit tests
        run: npx tsx scripts/synthetic-monitor.test.ts

  availability-check:
    name: Availability check (one-shot)
    runs-on: ubuntu-latest
    # Only run the live check on schedule or manual dispatch, not on every PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tsx
        run: npm install -g tsx

      - name: Run synthetic monitor (one-shot)
        env:
          ONCE: 'true'
          BASE_URL: ${{ github.event.inputs.base_url || vars.SYNTHETIC_MONITOR_URL || 'https://stellar-earn.vercel.app' }}
          ALERT_WEBHOOK_URL: ${{ secrets.MONITOR_ALERT_WEBHOOK_URL }}
        run: npx tsx scripts/synthetic-monitor.ts
