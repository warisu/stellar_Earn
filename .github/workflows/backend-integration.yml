name: Backend Integration Tests
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [main, master]
    paths:
      - "BackEnd/**"
      - ".github/workflows/backend-integration.yml"
  pull_request:
    paths:
      - "BackEnd/**"
      - ".github/workflows/backend-integration.yml"

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: stellar_earn_test_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: BackEnd

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_DATABASE: stellar_earn_test_integration
      DATABASE_URL: postgresql://postgres:password@localhost:5432/stellar_earn_test_integration
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret
      JWT_PRIVATE_KEY: "dummy"
      JWT_PUBLIC_KEY: "dummy"
      STELLAR_MOCK_CURRENT_LEDGER: 60000000
      SOROBAN_SECRET_KEY: SAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      STELLAR_NETWORK: testnet
      HORIZON_URL: https://horizon-testnet.stellar.org
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      SENDGRID_API_KEY: ""
      EMAIL_FROM_ADDRESS: test@stellarearn.com
      EMAIL_FROM_NAME: Stellar Earn Test
      APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BackEnd/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  integration-gate:
    name: Integration Tests Gate
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: always()

    steps:
      - name: Validate results
        run: |
          status="${{ needs.integration-tests.result }}"
          echo "Integration tests status: $status"
          if [ "$status" != "success" ]; then
            echo "Integration tests failed"
            exit 1
          fi
          echo "All integration tests passed"
