name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-contracts:
    name: Detect Contract Changes
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect contract-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            contracts:
              - "contracts/**"
              - "scripts/**"
              - "tests/**"
              - "package.json"
              - ".github/workflows/ci.yml"

  repo-policy-checks:
    name: Repository Policy Checks
    runs-on: ubuntu-latest
    needs: check-contracts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run lightweight repository tests
        run: |
          if [ -f package.json ]; then npm test || true; fi

      - name: Run orphaned scripts check
        run: node scripts/check-orphaned-scripts.js

      - name: Enforce contract changelog discipline
        env:
          CHANGELOG_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          CHANGELOG_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CHANGELOG_PR_TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message }}
          CHANGELOG_PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: node scripts/check-contract-changelog-discipline.js

  build-and-test:
    name: Build and Test Contracts
    needs: [check-contracts, repo-policy-checks]
    if: needs.check-contracts.outputs.contracts == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: contracts/earn-quest
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Remove Cargo.lock to prevent cache issues
        run: |
          if [ -f "Cargo.lock" ]; then
            rm Cargo.lock
            echo "Removed Cargo.lock to prevent CI cache corruption"
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: Contract/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Build workspace
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Generate and validate provenance attestation
        run: |
          node scripts/generate-provenance.js
          node scripts/check-provenance.js

      - name: License check
        run: |
          cargo install cargo-deny || true
          make license-check

  orphaned-scripts-check:
    name: Orphaned Scripts Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run orphaned scripts check
        run: node scripts/check-orphaned-scripts.js

  contract-checks-gate:
    name: Contract Checks Gate
    runs-on: ubuntu-latest
    needs: [check-contracts, build-and-test, repo-policy-checks]
    if: always()

    steps:
      - name: Validate results
        run: |
          contracts_changed="${{ needs.check-contracts.outputs.contracts }}"
          detect_status="${{ needs.check-contracts.result }}"
          policy_status="${{ needs.repo-policy-checks.result }}"
          build_status="${{ needs.build-and-test.result }}"

          echo "Contracts changed: $contracts_changed"
          echo "Detect job: $detect_status"
          echo "Policy checks: $policy_status"
          echo "Build status: $build_status"

          if [ "$detect_status" != "success" ]; then
            echo "❌ Contract detection failed"
            exit 1
          fi

          if [ "$policy_status" != "success" ]; then
            echo "❌ Repository policy checks failed"
            exit 1
          fi

          if [ "$contracts_changed" = "true" ]; then
            if [ "$build_status" != "success" ]; then
              echo "❌ Contract build/test failed"
              exit 1
            fi
          fi

          echo "✅ All required checks passed"
          exit 0