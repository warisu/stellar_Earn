name: env-parity

on:
  pull_request:
    paths:
      - '**/.env.example'
      - 'scripts/validate-env-parity.sh'
      - '.github/workflows/env-parity.yml'
  push:
    branches: [main, master]
    paths:
      - '**/.env.example'
      - 'scripts/validate-env-parity.sh'
      - '.github/workflows/env-parity.yml'

jobs:
  validate:
    name: Validate .env.example parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unit test validate-env-parity.sh
        run: bash tests/validate-env-parity.test.sh

      - name: Validate FrontEnd env parity
        run: |
          # Create a temporary .env from .env.example so CI always has a baseline
          cp FrontEnd/my-app/.env.example FrontEnd/my-app/.env.local
          bash scripts/validate-env-parity.sh \
            FrontEnd/my-app/.env.example \
            FrontEnd/my-app/.env.local

      - name: Validate BackEnd env parity
        run: |
          cp BackEnd/.env.example BackEnd/.env
          bash scripts/validate-env-parity.sh \
            BackEnd/.env.example \
            BackEnd/.env

      - name: Validate Subgraph env parity
        run: |
          cp subgraph/.env.example subgraph/.env
          bash scripts/validate-env-parity.sh \
            subgraph/.env.example \
            subgraph/.env
